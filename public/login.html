<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Administrateur</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0a0d14;
      color: #eee;
      font-family: Arial, sans-serif;
    }
    input {
      padding: 8px;
      margin: 5px 0;
      width: 200px;
    }
    button {
      padding: 8px 12px;
      margin-top: 10px;
      cursor: pointer;
      background: #444;
      color: #eee;
      border: none;
    }
    button:hover {
      background: #666;
    }
    #error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Connexion Administrateur</h1>

<input id="username" placeholder="Nom d'utilisateur">
<input id="password" type="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>
<button onclick="continueAsUser()">Continuer sans se connecter</button>

<p id="error"></p>

<script>
function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errorEl = document.getElementById("error");

  fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  })
  .then(r => {
    if (!r.ok) throw new Error();
    return r.json();
  })
  .then(data => {
    // Connexion réussie → redirection vers la carte
    window.location.href = "index.html";
  })
  .catch(() => {
    errorEl.textContent = "Identifiants incorrects";
  });
}

// Fonction pour continuer comme joueur
function continueAsUser() {
  sessionStorage.setItem("role", "user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
